target-version = "py310"

# Set line length to 88 (Black standard)
# line-length = 88
# indent-width = 4

[lint]
extend-select = [
    "F",        # Pyflakes rules
    "W",        # PyCodeStyle warnings
    "E",        # PyCodeStyle errors
    "I",        # Sort imports properly
    "UP",       # Warn if certain things can changed due to newer Python versions
    "C4",       # Catch incorrect use of comprehensions, dict, list, etc
    "FA",       # Enforce from __future__ import annotations
    "ISC",      # Good use of string concatenation
    "ICN",      # Use common import conventions
    "RET",      # Good return practices
    "SIM",      # Common simplification rules
    "TID",      # Some good import practices
    "TC",       # Enforce importing certain types in a TYPE_CHECKING block
    "PTH",      # Use pathlib instead of os.path
    "TD",       # Be diligent with TODO comments
    "NPY",      # Some numpy-specific things
    "FURB",     # Suggest more idiomatic Python patterns
]

ignore = [
    "E501", # Line too long (handled by formatter)
    "S101", # Use of `assert` detected (common in tests, careful in prod)
    "PLR0913", # Too many arguments (often necessary)
    "PLR2004", # Magic value used in comparison
]

# # Allow autofix for all enabled rules (when `--fix` is passed)
# fixable = ["ALL"]
# unfixable = []

# # Allow unused variables on underscore-prefixed names
# dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# [tool.ruff.lint.per-file-ignores]
# # Ignore specific rules for test files
# "tests/**" = ["S101", "ANN", "PLR2004"]
# # Ignore specific rules for scripts
# "scripts/**" = ["S101", "T201"]

[format]
skip-magic-trailing-comma = false
line-ending = "auto"

docstring-code-format = true
docstring-code-line-length = 20
